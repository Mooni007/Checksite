bel:'Pay Revised on 01/07/2016',scaleYear:2016},{date:'01/12/2016',type:'inc',label:'Annual Inc on 01/12/2016'},{date:'01/07/2017',type:'rev',label:'Pay Revised on 01/07/2017',scaleYear:2017},{date:'01/12/2017',type:'inc',label:'Annual Inc on 01/12/2017'},{date:'01/12/2018',type:'inc',label:'Annual Inc on 01/12/2018'},{date:'01/12/2019',type:'inc',label:'Annual Inc on 01/12/2019'},{date:'01/12/2020',type:'inc',label:'Annual Inc on 01/12/2020'},{date:'01/12/2021',type:'inc',label:'Annual Inc on 01/12/2021'},{date:'01/07/2022',type:'rev',label:'Pay Revised on 01/07/2022',scaleYear:2022},{date:'01/12/2022',type:'inc',label:'Annual Inc on 01/12/2022'},{date:'01/12/2023',type:'inc',label:'Annual Inc on 01/12/2023'},{date:'01/12/2024',type:'inc',label:'Annual Inc on 01/12/2024'},{date:'01/12/2025',type:'inc',label:'Annual Inc on 01/12/2025'},{date:'01/12/2026',type:'inc',label:'Annual Inc on 01/12/2026'}

  const sel = document.getElementById('inp_scale');
  if(sel){

const AF_REV_DATES = {};
AF_PAY_EVENTS.forEach(ev => { if(ev.type === 'rev' && ev.scaleYear) { if(!AF_REV_DATES[ev.scaleYear]) { AF_REV_DATES[ev.scaleYear] = ev.date; } } });

function afParseDate(s) { if(!s) return null; s = s.trim(); if(s.match(/^\d{4}-\d{2}-\d{2}$/)) { const p = s.split('-'); s = p[2] + '/' + p[1] + '/' + p[0]; } const p = s.split('/'); if(p.length !== 3) return null; const d = new Date(+p[2], +p[1] - 1, +p[0]); return isNaN(d.getTime()) ? null : d; }
function afFormatDate(d) { if(!d) return ''; return String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + d.getFullYear(); }
function afIsJunNov(d) { return (d.getMonth() + 1) >= 6 && (d.getMonth() + 1) <= 11; }
function afGetScaleRevisions(s) { return AF_PAY_SCALES[s] || []; }
function afGetScaleEntry(s, y) { return afGetScaleRevisions(s).find(r => r.year === y) || null; }
function afGetApplicableRevYear(s, bd) { const revs = afGetScaleRevisions(s); let eff = null; for(const rev of revs) { const edStr = AF_REV_DATES[rev.year]; const ed = edStr ? afParseDate(edStr) : null; if(ed && ed <= bd) { eff = rev; } else if(!ed && rev.year <= bd.getFullYear()) { eff = rev; } } return eff ? eff.year : (revs.length > 0 ? revs[0].year : null); }
function afGetStageIndex(s, sy, p) { const r = afGetScaleEntry(s, sy); if(!r) return 0; const i = r.stages.indexOf(p); return i >= 0 ? i : 0; }
function afFixOnRevision(s, o, n, p) { const or = afGetScaleEntry(s, o), nr = afGetScaleEntry(s, n); if(!or || !nr) return p; const si = afGetStageIndex(s, o, p); return nr.stages[Math.min(si, nr.stages.length - 1)]; }
function afApplyIncrement(s, sy, p) { const r = afGetScaleEntry(s, sy); if(!r) return p; const ci = afGetStageIndex(s, sy, p); return ci >= r.stages.length - 1 ? r.stages[r.stages.length - 1] : r.stages[ci + 1]; }
function afIsMaxStage(s, sy, p) { const r = afGetScaleEntry(s, sy); return !!r && p >= r.stages[r.stages.length - 1]; }
function afGetScaleSummary(s, sy) { const r = afGetScaleEntry(s, sy); return r ? `${r.min}-${r.inc}-${r.stages[r.stages.length - 1]}` : ''; }

let AF_ROWS = [], AF_MD = null, AF_RD = null;

function calculateAFPay() {
  const mustred = document.getElementById('inp_mustred').value;
  const retire = document.getElementById('inp_retire').value;
  const scale = document.getElementById('inp_scale').value;
  const errEl = document.getElementById('af_error_area');
  const resEl = document.getElementById('af_result_area');
  
  errEl.classList.add('af-hidden');
  resEl.classList.add('af-hidden');
  
  if(!mustred || !retire || !scale) { errEl.textContent = 'Please fill all required fields (Mustered Date, Pay Scale, Retirement Date).'; errEl.classList.remove('af-hidden'); return; }
  
  const mD = afParseDate(mustred), rD = afParseDate(retire);
  if(!mD || !rD) { errEl.textContent = 'Invalid date format.'; errEl.classList.remove('af-hidden'); return; }
  if(rD <= mD) { errEl.textContent = 'Retirement date must be after mustered date.'; errEl.classList.remove('af-hidden'); return; }
  if(!afGetScaleRevisions(scale).length) { errEl.textContent = 'Scale not found.'; errEl.classList.remove('af-hidden'); return; }
  
  AF_MD = mD; AF_RD = rD;
  const iRY = afGetApplicableRevYear(scale, mD);
  if(!iRY) { errEl.textContent = 'No applicable scale revision found.'; errEl.classList.remove('af-hidden'); return; }
  
  const iR = afGetScaleEntry(scale, iRY), mJN = afIsJunNov(mD), iP = iR.stages[0];
  let cP = iP, cS = scale, cRY = iRY;
  
  const rows = [{ id: 'r1', eventLabel: `Mustered in Scale ${scale} on ${afFormatDate(mD)}`, date: mD, scale: cS, scaleRevYear: cRY, pay: cP, changeAmt: 0, remark: 'Initial Stage 0', type: 'mustered', skipNextInc: mJN }];
  let sk = mJN;
  
  for(const ev of AF_PAY_EVENTS) {
    const ed = afParseDate(ev.date);
    if(!ed || ed <= mD || ed > rD) continue;
    if(ev.type === 'inc') {
      if(sk) { sk = false; rows.push({ id: 'r' + Date.now() + Math.random(), eventLabel: ev.label + ' (Skip)', date: ed, scale: cS, scaleRevYear: cRY, pay: cP, changeAmt: 0, remark: 'Jun-Nov Skip', type: 'inc-skip' }); continue; }
      if(afIsMaxStage(cS, cRY, cP)) { rows.push({ id: 'r' + Date.now() + Math.random(), eventLabel: ev.label + ' (Max)', date: ed, scale: cS, scaleRevYear: cRY, pay: cP, changeAmt: 0, remark: 'Max Stage', type: 'inc' }); continue; }
      const pr = cP; cP = afApplyIncrement(cS, cRY, cP);
      rows.push({ id: 'r' + Date.now() + Math.random(), eventLabel: ev.label, date: ed, scale: cS, scaleRevYear: cRY, pay: cP, changeAmt: cP - pr, remark: 'Inc', type: 'inc' });
    } else if(ev.type === 'rev') {
      if(!afGetScaleEntry(cS, ev.scaleYear)) continue;
      const pr = cP, oRY = cRY; cRY = ev.scaleYear; cP = afFixOnRevision(cS, oRY, cRY, pr);
      rows.push({ id: 'r' + Date.now() + Math.random(), eventLabel: ev.label, date: ed, scale: cS, scaleRevYear: cRY, pay: cP, changeAmt: cP - pr, remark: 'Revision', type: 'rev' });
    }
  }
  
  const rJN = afIsJunNov(rD);
  if(rJN && !afIsMaxStage(cS, cRY, cP)) { const pr = cP; cP = afApplyIncrement(cS, cRY, cP); rows.push({ id: 'r' + Date.now() + Math.random(), eventLabel: 'Pension Increment', date: rD, scale: cS, scaleRevYear: cRY, pay: cP, changeAmt: cP - pr, remark: 'Retired Jun-Nov', type: 'pension' }); }
  
  AF_ROWS = rows;
  afUpdateCard();
  afRenderTable();
  resEl.classList.remove('af-hidden');
  resEl.scrollIntoView({ behavior: 'smooth' });
}

function afUpdateCard() {
  if(!AF_ROWS.length) return;
  const lR = AF_ROWS[AF_ROWS.length - 1], rJN = afIsJunNov(AF_RD);
  document.getElementById('af_summary_boxes').innerHTML = `<div class="af-final-pay-card"><div class="af-card-label">Final Basic Pay at Retirement</div><div class="af-card-amount">Rs. ${lR.pay.toLocaleString()}</div><div class="af-card-detail">Scale: ${lR.scale} | Retirement: ${afFormatDate(AF_RD)}${rJN ? ' | Pension Added' : ''}</div></div>`;
}

function afRenderTable() {
  AF_ROWS.forEach((r, i) => r.sno = i + 1);
  const lR = AF_ROWS[AF_ROWS.length - 1];
  let h = `<table class="af-pay-table"><thead><tr><th>S.No</th><th>Pay Details</th><th>Pay Scale</th><th>Basic Pay (Rs)</th><th>Change (Rs)</th><th>Remarks</th></tr></thead><tbody>`;
  AF_ROWS.forEach(r => {
    const rc = r.type === 'mustered' ? 'af-row-mustered' : r.type === 'rev' ? 'af-row-rev' : r.type === 'pension' ? 'af-row-pension' : '';
    const sc = afGetScaleSummary(r.scale, r.scaleRevYear);
    const chg = r.changeAmt > 0 ? '+' + r.changeAmt.toLocaleString() : (r.changeAmt < 0 ? r.changeAmt.toLocaleString() : '—');
    h += `<tr class="${rc}"><td>${r.sno}</td><td style="text-align:left;">${r.eventLabel}</td><td style="font-size:clamp(6px,0.6vw,9px);">${r.scale}<br><small>(${sc})</small></td><td style="font-weight:700;">${r.pay.toLocaleString()}</td><td style="color:${r.changeAmt > 0 ? '#2e7d32' : r.changeAmt < 0 ? '#c62828' : 'inherit'};font-weight:${r.changeAmt !== 0 ? '700' : '400'};">${chg}</td><td style="font-size:clamp(6px,0.6vw,9px);text-align:left;">${r.remark}</td></tr>`;
  });
  h += `</tbody></table>`;
  if(lR) { h += `<div class="af-pay-summary-footer"><b>Final Basic Pay at Retirement:</b> Rs. ${lR.pay.toLocaleString()} | <b>Scale:</b> ${lR.scale} | <b>Retirement:</b> ${afFormatDate(AF_RD)}</div>`; }
  document.getElementById('af_pay_table_area').innerHTML = h;
}

function openAFPrintPreview() { if(!AF_ROWS.length) { alert('Please calculate pay details first.'); return; } window.print(); }
